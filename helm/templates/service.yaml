apiVersion: v1
kind: Service
metadata:
  name: {{ include "nessus-secrets.fullname" . }}
  labels:
    {{- include "nessus-secrets.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8834
      protocol: TCP
      name: https
  selector:
    {{- include "nessus-secrets.selectorLabels" . | nindent 4 }}
