apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nessus-secrets.fullname" . }}
  labels:
    {{- include "nessus-secrets.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "nessus-secrets.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nessus-secrets.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "tenable/nessus:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8834
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: ACTIVATION_CODE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: activation_code
                  optional: true
            - name: USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: username
                  optional: true
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: password
                  optional: true
          {{- if .Values.serverCert.enabled }}
          volumeMounts:
            - name: nessus-server-cert
              mountPath: "/tls"
              readOnly: true
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    echo "[postStart] Checking for server certificate material..."
                    KEY="/tls/tls.key"; CRT="/tls/tls.crt"; CACFG="/tls/ca.crt"
                    LEAF="/tmp/server-leaf.crt"; CHAIN="/tmp/ca-chain.crt"
                    if [ -f "$KEY" ] && [ -f "$CRT" ]; then
                      echo "[postStart] tls.key and tls.crt found"
                      # Split tls.crt into individual certs (cert1=leaf, cert2+=chain)
                      awk 'BEGIN{c=0} /-----BEGIN CERTIFICATE-----/{c++} {print > ("/tmp/cert" c ".pem")}' "$CRT" || true
                      if [ -s /tmp/cert1.pem ]; then
                        cp -f /tmp/cert1.pem "$LEAF" || cp -f "$CRT" "$LEAF"
                      else
                        cp -f "$CRT" "$LEAF" || true
                      fi

                      # Build chain from remaining certs (exclude leaf), or use ca.crt if provided
                      : > "$CHAIN"
                      if [ -f "$CACFG" ]; then
                        echo "[postStart] Using provided /tls/ca.crt as CA chain"
                        cp -f "$CACFG" "$CHAIN" || true
                      else
                        i=2
                        while [ -f "/tmp/cert${i}.pem" ]; do
                          cat "/tmp/cert${i}.pem" >> "$CHAIN" || true
                          i=$((i+1))
                        done
                      fi

                      # Verify leaf against CA chain if we have one
                      if [ -s "$CHAIN" ]; then
                        echo "[postStart] Verifying leaf against CA chain..."
                        if command -v openssl >/dev/null 2>&1; then
                          openssl verify -CAfile "$CHAIN" "$LEAF" || {
                            echo "[postStart] OpenSSL verify failed; skipping import to avoid mismatch"
                            exit 0
                          }
                        else
                          echo "[postStart] openssl not available; proceeding without pre-verify"
                        fi
                        if [ -x /opt/nessus/sbin/nessuscli ]; then
                          echo "[postStart] Importing with nessuscli (leaf=$LEAF, chain=$CHAIN)"
                          /opt/nessus/sbin/nessuscli import-certs --serverkey="$KEY" --servercert="$LEAF" --cacert="$CHAIN" || true
                          echo "[postStart] Import attempted"
                        else
                          echo "[postStart] nessuscli not executable yet; skipping import"
                        fi
                      else
                        echo "[postStart] No CA chain available (no intermediates and no ca.crt); skipping import"
                      fi
                    else
                      echo "[postStart] TLS files not present; skipping import"
                    fi
                    true
          {{- end }}
      {{- if .Values.serverCert.enabled }}
      volumes:
        - name: nessus-server-cert
          secret:
            secretName: {{ .Values.serverCert.secretName }}
            optional: true
      {{- end }}
