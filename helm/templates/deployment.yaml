apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nessus-secrets.fullname" . }}
  labels:
    {{- include "nessus-secrets.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "nessus-secrets.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nessus-secrets.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "tenable/nessus:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8834
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: ACTIVATION_CODE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: activation_code
                  optional: true
            - name: USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: username
                  optional: true
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: password
                  optional: true
          {{- if .Values.serverCert.enabled }}
          volumeMounts:
            - name: nessus-server-cert
              mountPath: "/tls"
              readOnly: true
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    OUT="/proc/1/fd/1"; ERR="/proc/1/fd/2"
                    echo "[postStart] Checking for server certificate material..." >"$OUT"
                    KEY="/tls/tls.key"; CRT="/tls/tls.crt"; CACFG="/tls/ca.crt"
                    LEAF="/tmp/server-leaf.crt"; CHAIN="/tmp/ca-chain.crt"
                    if [ -f "$KEY" ] && [ -f "$CRT" ]; then
                      echo "[postStart] tls.key and tls.crt found" >"$OUT"
                      # Split tls.crt into individual certs (cert1=leaf, cert2+=chain)
                      awk 'BEGIN{c=0} /-----BEGIN CERTIFICATE-----/{c++} {print > ("/tmp/cert" c ".pem")}' "$CRT" || true
                      if [ -s /tmp/cert1.pem ]; then
                        cp /tmp/cert1.pem "$LEAF" || cp "$CRT" "$LEAF"
                      else
                        cp "$CRT" "$LEAF" || true
                      fi
                      # Build chain from remaining certs, or use ca.crt if provided
                      if [ -f "$CACFG" ]; then
                        echo "[postStart] Using provided /tls/ca.crt as CA chain" >"$OUT"
                        cp "$CACFG" "$CHAIN" || true
                      else
                        : > "$CHAIN"
                        i=2
                        while [ -f "/tmp/cert${i}.pem" ]; do
                          cat "/tmp/cert${i}.pem" >> "$CHAIN" || true
                          i=$((i+1))
                        done
                        [ ! -s "$CHAIN" ] && cp "$CRT" "$CHAIN" || true
                      fi
                      if [ -x /opt/nessus/sbin/nessuscli ]; then
                        echo "[postStart] Importing with nessuscli (leaf=$LEAF, chain=$CHAIN)" >"$OUT"
                        /opt/nessus/sbin/nessuscli import-certs --serverkey="$KEY" --servercert="$LEAF" --cacert="$CHAIN" >>"$OUT" 2>>"$ERR" || true
                        echo "[postStart] Import attempted" >"$OUT"
                      else
                        echo "[postStart] nessuscli not executable yet; skipping import" >"$OUT"
                      fi
                    else
                      echo "[postStart] TLS files not present; skipping import" >"$OUT"
                    fi
                    true
          {{- end }}
      {{- if .Values.serverCert.enabled }}
      volumes:
        - name: nessus-server-cert
          secret:
            secretName: {{ .Values.serverCert.secretName }}
            optional: true
      {{- end }}
