apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nessus-secrets.fullname" . }}
  labels:
    {{- include "nessus-secrets.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "nessus-secrets.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nessus-secrets.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "tenable/nessus:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8834
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: ACTIVATION_CODE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: activation_code
                  optional: true
            - name: USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: username
                  optional: true
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: password
                  optional: true
