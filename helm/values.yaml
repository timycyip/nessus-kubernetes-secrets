service:
  type: ClusterIP
  port: 8834

image:
  tag: latest-oracle
  pullPolicy: IfNotPresent

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# Secret containing credentials referenced by the Deployment.
# Must include keys: activation_code, username, password
secretName: nessus-credentials

# Note: This chart only supports Traefik TCP passthrough via IngressRouteTCP.
# Traefik HTTP/HTTPS re-encrypt mode is not supported.

# Ingress configuration
ingress:
  enabled: false
  className: "nginx"   # default to nginx with TLS passthrough support
  annotations: {}      # controller-specific annotations
  hosts:
    - host: nessus.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []               # leave empty for passthrough (backend presents cert)

  # Example for NGINX Ingress:
  # enabled: true
  # className: "nginx"
  # annotations:
  #   nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
  #   nginx.ingress.kubernetes.io/ssl-redirect: "true"
  # hosts:
  #   - host: nessus.example.com
  #     paths:
  #       - path: /
  #         pathType: Prefix
  # tls:
  #   - secretName: nessus-tls
  #     hosts:
  #       - nessus.example.com
  #
  # Example for Traefik Ingress (with upstream cert skip):
  # enabled: true
  # className: "traefik"
  # annotations:
  #   traefik.ingress.kubernetes.io/router.entrypoints: websecure
  #   traefik.ingress.kubernetes.io/router.tls: "true"
  #   traefik.ingress.kubernetes.io/service.port: "8834"
  #   traefik.ingress.kubernetes.io/service.serversscheme: https
  #   traefik.ingress.kubernetes.io/service.serverstransport: "{{ .Release.Namespace }}/nessus-transport"
  # hosts:
  #   - host: nessus.example.com
  #     paths:
  #       - path: /
  #         pathType: Prefix
  # tls:
  #   - secretName: nessus-tls
  #     hosts:
  #       - nessus.example.com

# NGINX-specific options
nginx:
  sslPassthrough: true  # enable TLS passthrough for NGINX Ingress

# Optional Traefik TCP passthrough (disabled by default)
traefikTcp:
  enabled: false
  entryPoint: websecure
  hostSNI: nessus.example.com
  servicePort: 8834

# Optional server certificate override (default: Nessus uses self-signed cert)
serverCert:
  enabled: false
  secretName: nessus-tls
  certManager:
    enabled: false
    clusterIssuer: ""
    issuerRef:
      name: ""
      kind: ""
    commonName: nessus.example.com
    dnsNames:
      - nessus.example.com
