service:
  type: ClusterIP
  port: 8834

image:
  tag: latest
  pullPolicy: IfNotPresent

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# Secret containing credentials referenced by the Deployment.
# Must include keys: activation_code, username, password
secretName: nessus-credentials

# Ingress configuration
ingress:
  enabled: false
  className: ""        # e.g., "traefik" or "nginx"
  annotations: {}      # controller-specific annotations
  hosts:
    - host: nessus.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # Example:
  # tls:
  #   - secretName: nessus-tls
  #     hosts:
  #       - nessus.example.com
